<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SolChat Heartbeat Test</title>
</head>
<body>
<h2>SolChat 접속 및 하트비트 테스트</h2>
<div>
    <label>Access Token (Bearer 제외):</label>
    <input type="text" id="token" placeholder="로그인 후 토큰 입력" style="width: 300px;">
    <button onclick="connect()">연결 시작</button>
</div>
<hr/>
<div id="status">상태: 연결 안 됨</div>
<div id="logs" style="border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px;"></div>

<script>
    let socket;
    let heartbeatInterval;

    function log(msg) {
        const logs = document.getElementById("logs");
        logs.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        logs.scrollTop = logs.scrollHeight;
    }

    function connect() {
        const token = document.getElementById("token").value;
        if (!token) {
            alert("토큰을 입력하세요!");
            return;
        }

        // 1. 웹소켓 연결
        socket = new WebSocket("ws://localhost:8080/ws/chat?token=" + token);

        socket.onopen = function() {
            document.getElementById("status").innerText = "상태: 🟢 연결됨";
            log("웹소켓 연결 성공!");

            // 2. 하트비트 시작 (5초마다)
            startHeartbeat(token);
        };

        socket.onmessage = function(event) {
            log("메시지 수신: " + event.data);
        };

        socket.onclose = function() {
            document.getElementById("status").innerText = "상태: 🔴 연결 종료";
            log("연결 끊김");
            stopHeartbeat();
        };
    }

    function startHeartbeat(token) {
        log("💓 Heartbeat 타이머 시작 (5초 주기)");
        heartbeatInterval = setInterval(() => {
            fetch('http://localhost:8080/api/chat/heartbeat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                }
            })
            .then(res => {
                if (res.ok) log("✅ Heartbeat 전송 성공 (TTL 연장됨)");
                else log("❌ Heartbeat 실패: " + res.status);
            })
            .catch(err => log("❌ 에러: " + err));
        }, 5000); // 5초마다 전송
    }

    function stopHeartbeat() {
        clearInterval(heartbeatInterval);
        log("🛑 Heartbeat 타이머 중지");
    }
</script>
</body>
</html>
